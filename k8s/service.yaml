apiVersion: v1
kind: Service
metadata:
  name: streamlit-frontend
  namespace: streamlit-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: streamlit-frontend
  ports:
    - name: http
      appProtocol: http
      port: 80
      targetPort: 8501
      protocol: TCP
  type: LoadBalancer
