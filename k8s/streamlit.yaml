apiVersion: v1
kind: Namespace
metadata:
  name: streamlit-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-frontend
  namespace: streamlit-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-frontend
  template:
    metadata:
      labels:
        app: streamlit-frontend
    spec:
      containers:
        - name: streamlit-frontend
          image: 932566365205.dkr.ecr.ap-south-2.amazonaws.com/streamlit-frontend:v1
          ports:
            - containerPort: 8501
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-frontend
  namespace: streamlit-app
spec:
  selector:
    app: streamlit-frontend
  ports:
    - port: 80
      targetPort: 8501
      protocol: TCP
  type: LoadBalancer